openapi: 3.0.3
info:
  title: MOCREO IoT Platform Public API Documentation
  description: |
    MOCREO IoT Platform Public API Documentation v1.0 English Version

    Welcome to the MOCREO IoT Platform's public API! This document will guide you on how to programmatically interact with your MOCREO devices and data to achieve automated management and data integration.

    ## System Introduction

    The MOCREO IoT Platform is a powerful remote monitoring solution designed to help you track and manage environmental data in real-time through our smart sensors and gateway devices. Whether you need to monitor temperature, humidity, or prevent water leaks, MOCREO provides reliable and easy-to-use tools.

    This set of public APIs is designed to provide you with a programmatic channel to access and manage the resources under your account. Through these interfaces, you can:

    * Get detailed information about your assets and devices.
    * Read historical sensor data reported by devices.
    * Programmatically trigger data exports.
    * Integrate MOCREO data into your own applications or third-party services.

    ## Basic Concepts

    * **Asset**: Represents a logical or physical space, serving as the top-level container for managing your devices, such as "My Home" or "Office Warehouse". Each API Key is bound to a specific asset.
    * **Device**: Refers to MOCREO hardware products, like the ST6 climate sensor, SW2 water leak sensor, or H5-LITE gateway. Devices are "bound" to an asset.
    * **API Key**: Your unique credential for API authentication, granting programmatic access to resources under a specific asset.

    ## Authentication

    All public APIs on this platform use API Key for authentication. This is a simple and secure method.

    You must include an HTTP header named `X-API-Key` in every API request, with its value being your complete API Key.

    **API Key Structure:**

    Your API Key consists of three parts, in the format `mok_[Prefix]_[Secret]`.

    * `mok_`: A fixed identifier.
    * `Prefix`: The public prefix of the key, used for identification.
    * `Secret`: The private part of the key, used for authentication.

    ## How to Create an API Key

    API Keys must be created through the MOCREO web dashboard (Feature not yet implemented, use the API to generate API keys for now).

    1.  Log in to your MOCREO account.
    2.  Navigate to the **Asset** for which you want to create an API Key.
    3.  Go to the asset's **"Settings"** page and find and click the **"API Keys"** tab.
    4.  Click the **"Create API Key"** button.
    5.  In the pop-up window:
        * Enter an easy-to-recognize **display name** for this key (e.g., "My Data Backup Script").
        * Check the **permissions** you wish to grant to the key from the list (e.g., `device.read` and `device.update`).
        * (Optional) You can set an **expiration date**, after which the key will automatically become invalid.
    6.  Click **"Create"**.
    7.  The system will generate and display your **full API Key**.

    > **Important: This is the only time you will see the full key! Please copy and store it securely immediately.**

    ## Permission System

    Security is our top priority. The permissions for API Keys follow these principles:

    1.  **Asset-Bound**: Each API Key is strictly bound to the **Asset** specified at the time of creation. All operations using this key cannot cross over to other assets.
    2.  **Principle of Least Privilege**: When creating an API Key, you must grant it a specific set of permissions. A key can only perform operations within the scope of its granted permissions.

    Here are the permissions relevant to this public API:

    * `asset.read`: Allows reading basic information about the asset.
    * `asset.update`: Allows updating asset information, such as modifying asset names and configurations.
    * `device.read`: Allows reading the device list, device details, historical data, and proxy information.
    * `device.update`: Allows updating device information, such as changing the device name.
    * `membership.read`: Allows reading member information.
    * `membership.update`: Allows updating member information.
    * `membership.delete`: Allows deleting members.

    ## Rate Limiting

    To ensure the stability of the service, all requests made via API Key are subject to rate limits:

    * **Total Request Limit**: Each API Key is allowed a maximum of **1000** requests per hour.
    * **Concurrent Request Limit**: Each API Key is allowed a maximum of **3** concurrent requests.

    If you exceed the limit, the server will return a `429 Too Many Requests` error.
  version: 1.0.0
  contact:
    name: MOCREO IoT API Support
    email: support@mocreo.com
